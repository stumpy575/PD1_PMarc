<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/index.js"></script>
</head>
<body>
<div class="wrapper">
    <h1>Login</h1>

    <nav class="nav-tabs">
        <button id="btnLogin" class="tab-btn selected">Login</button>
        <button id="btnSignin" class="tab-btn">Register</button>
    </nav>

    <section id="loginPanel" class="panel">
        <form id="loginForm">
            <label>Username:</label>
            <input type="text" id="inputUsername" required>
            <label>Password:</label>
            <input type="password" id="inputPassword" required>
            <button type="submit" class="submit-btn">Sign in</button>
        </form>
    </section>

    <section id="signinPanel" class="panel" style="display: none;">
        <form id="signinForm">
            <label>Email:</label>
            <input type="email" id="inputEmail" required>
            <label>Username:</label>
            <input type="text" id="inputNewUser" required>
            <label>Password:</label>
            <input type="password" id="inputNewPass" required>
            <label>Confirm password:</label>
            <input type="password" id="inputConfirmPass" required>
            <button type="submit" class="submit-btn">Register</button>
        </form>
    </section>

    <p id="statusMsg"></p>
</div>
</body>
</html>
